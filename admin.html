<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Ramji Tour and Travel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/theme.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { blue: '#0b2e59', orange: '#ff6b35', light: '#f8f9fa' } }, fontFamily: { sans: ['Outfit', 'sans-serif'] } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="font-sans bg-gray-100 dark:bg-slate-800 text-gray-800 dark:text-gray-100 antialiased h-screen flex overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-brand-blue text-white flex flex-col">
        <div class="h-20 flex items-center justify-center border-b border-white/10 px-4">
            <a href="index.html" class="flex items-center gap-3">
                <span class="text-xl font-extrabold tracking-tight">Ramji <span class="text-brand-orange">Admin</span></span>
            </a>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="#" class="block px-4 py-2.5 bg-white dark:bg-slate-800/10 rounded-lg font-medium text-white transition-colors">Overview</a>
            <a href="#" class="block px-4 py-2.5 rounded-lg font-medium text-white/70 hover:bg-white dark:bg-slate-800/5 hover:text-white transition-colors">Bookings</a>
            <a href="#" class="block px-4 py-2.5 rounded-lg font-medium text-white/70 hover:bg-white dark:bg-slate-800/5 hover:text-white transition-colors">Cab Bookings</a>
            <a href="#" class="block px-4 py-2.5 rounded-lg font-medium text-white/70 hover:bg-white dark:bg-slate-800/5 hover:text-white transition-colors">Users</a>
        </nav>
        <div class="p-4 border-t border-white/10">
            <button id="admin-logout" class="w-full text-left px-4 py-2 text-white/70 hover:text-brand-orange transition-colors">Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-20 bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 flex items-center justify-between px-8">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">Dashboard Overview</h1>
            <div class="flex items-center gap-4">
                <div class="text-sm font-medium text-gray-600 dark:text-gray-300" id="admin-email">Loading...</div>
                <div class="w-10 h-10 rounded-full bg-brand-blue text-white flex items-center justify-center font-bold">A</div>
            </div>
        </header>
        
        <div class="flex-1 overflow-auto p-8">
            
            <div id="loading-state" class="flex flex-col items-center justify-center h-full">
                <div class="w-12 h-12 border-4 border-brand-orange border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-gray-500 dark:text-gray-400 font-medium">Verifying admin access...</p>
            </div>

            <div id="admin-content" class="hidden space-y-8">
                <!-- Stats Row -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-sm">
                        <div class="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Total Users</div>
                        <div class="text-3xl font-extrabold text-brand-blue dark:text-white" id="stat-users">0</div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-sm">
                        <div class="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Total Bookings</div>
                        <div class="text-3xl font-extrabold text-brand-blue dark:text-white" id="stat-bookings">0</div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-sm">
                        <div class="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Cab Bookings</div>
                        <div class="text-3xl font-extrabold text-brand-blue dark:text-white" id="stat-cabs">0</div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-sm">
                        <div class="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1">Revenue (Simulated)</div>
                        <div class="text-3xl font-extrabold text-brand-orange" id="stat-revenue">₹0</div>
                    </div>
                </div>

                <!-- Recent Activity Tables -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- Recent Bookings -->
                    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-sm overflow-hidden">
                        <div class="px-6 py-4 border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900">
                            <h2 class="text-lg font-bold text-gray-800 dark:text-gray-100">Recent Package Bookings</h2>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-white dark:bg-slate-800 text-gray-500 dark:text-gray-400">
                                    <tr>
                                        <th class="px-6 py-3 font-semibold">User ID</th>
                                        <th class="px-6 py-3 font-semibold">Date</th>
                                        <th class="px-6 py-3 font-semibold">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="table-bookings" class="divide-y divide-gray-100">
                                    <!-- Injected by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Recent Cab Bookings -->
                    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-sm overflow-hidden">
                        <div class="px-6 py-4 border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900">
                            <h2 class="text-lg font-bold text-gray-800 dark:text-gray-100">Recent Cab Bookings</h2>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-white dark:bg-slate-800 text-gray-500 dark:text-gray-400">
                                    <tr>
                                        <th class="px-6 py-3 font-semibold">Route</th>
                                        <th class="px-6 py-3 font-semibold">Date</th>
                                        <th class="px-6 py-3 font-semibold">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="table-cabs" class="divide-y divide-gray-100">
                                    <!-- Injected by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <!-- Supabase CDN and Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/supabase-config.js"></script>
    <script type="module" src="js/admin.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
