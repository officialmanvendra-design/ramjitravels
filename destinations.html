<html lang="en" class="scroll-smooth">
<head>

    <meta property="og:description" content="Explore India's most breathtaking destinations with Ramji Tour and Travel. Discover spiritual sites, scenic landscapes, and cultural hubs.">

    <link rel="canonical" href="https://www.ramjitravels.com/destinations.html">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/theme.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { blue: '#0b2e59', orange: '#ff6b35', light: '#f8f9fa' } }, fontFamily: { sans: ['Outfit', 'sans-serif'] } } }
        }

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-sans bg-brand-light dark:bg-slate-900 text-gray-800 dark:text-gray-100 antialiased">
    <!-- Navbar -->
    <nav class="w-full z-50 bg-white dark:bg-slate-800 shadow-sm border-b border-gray-100 dark:border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center gap-3">
                    <img src="assets/images/logo.png" alt="Ramji Travels Logo" class="h-[104px] w-[104px] object-contain" onerror="this.src='https://placehold.co/100x100?text=Logo'">
                    <span class="text-2xl font-extrabold text-brand-blue dark:text-white tracking-tight">Ramji <span class="text-brand-orange">Travels</span></span>
                </a>
                <ul class="hidden md:flex space-x-6 items-center">
                    <li><a href="index.html" class="text-gray-800 dark:text-gray-100 hover:text-brand-orange font-medium transition-colors">Home</a></li>
                    <li><a href="destinations.html" class="text-gray-800 dark:text-gray-100 hover:text-brand-orange font-medium transition-colors">Destinations</a></li>
                    <li><a href="packages.html" class="text-gray-800 dark:text-gray-100 hover:text-brand-orange font-medium transition-colors">Packages</a></li>
                    <li><a href="gallery.html" class="text-gray-800 dark:text-gray-100 hover:text-brand-orange font-medium transition-colors">Gallery</a></li>
                    <li><a href="cab-booking.html" class="text-gray-800 dark:text-gray-100 hover:text-brand-orange font-medium transition-colors">Cab Booking</a></li>
                    <li><a href="itinerary-builder.html" class="text-gray-800 dark:text-gray-100 hover:text-brand-orange font-medium transition-colors">Plan Itinerary</a></li>
                    <li><a href="about.html" class="text-gray-800 dark:text-gray-100 hover:text-brand-orange font-medium transition-colors">About Us</a></li>
                </ul>
                <div class="hidden md:flex space-x-4 items-center">
                    <a href="contact.html" class="text-brand-blue dark:text-white font-medium hover:text-brand-orange dark:hover:text-brand-orange transition-colors self-center">Contact</a>
                    <button id="login-btn" onclick="document.getElementById('auth-modal').classList.remove('hidden')" class="text-gray-800 dark:text-gray-100 hover:text-brand-orange font-medium transition-colors">Login / Sign Up</button>
                    
                    <button class="theme-toggle-btn p-2 rounded-full hover:bg-gray-100 dark:bg-slate-800 dark:hover:bg-slate-700 transition-colors text-gray-600 dark:text-gray-300 ml-2" aria-label="Toggle Dark Mode">
                        <svg class="theme-icon-sun w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        <svg class="theme-icon-moon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                    <a id="profile-btn" href="profile.html" class="hidden text-gray-800 dark:text-gray-100 hover:text-brand-orange font-medium transition-colors flex items-center gap-2" title="My Profile">
                        <img src="https://ui-avatars.com/api/?name=User&background=0b2e59&color=fff" alt="Profile" class="w-8 h-8 rounded-full border-2 border-brand-blue dark:border-white">
                    </a>
                    <a href="booking.html" class="bg-brand-orange text-white px-6 py-2 rounded-full font-semibold hover:bg-orange-600 transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">Book Now</a>
                </div>
            </div>
        </div>
</nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h1 class="text-4xl font-bold text-brand-blue dark:text-white mb-8">Explore <span class="text-brand-orange">Destinations</span></h1>
        
        <div class="flex flex-col md:flex-row gap-8">
            <!-- Sidebar Filters -->
            <aside class="w-full md:w-1/4 bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700 h-fit">
                <h3 class="font-bold text-lg mb-4 text-brand-blue border-b pb-2 dark:text-white">Filters</h3>
                
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Search Destination</label>
                    <input type="text" id="dest-search" placeholder="E.g., Bali, Paris..." class="w-full px-4 py-2 border border-gray-200 dark:border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-orange">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Region</label>
                    <div class="space-y-2">
                        <label class="flex items-center"><input type="checkbox" class="rounded text-brand-orange focus:ring-brand-orange mr-2"> North India</label>
                        <label class="flex items-center"><input type="checkbox" class="rounded text-brand-orange focus:ring-brand-orange mr-2"> South India</label>
                        <label class="flex items-center"><input type="checkbox" class="rounded text-brand-orange focus:ring-brand-orange mr-2"> Nepal</label>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Budget</label>
                    <input type="range" min="500" max="5000" class="w-full accent-brand-orange">
                    <div class="flex justify-between text-xs text-gray-500 dark:text-gray-400 mt-1">
                        <span>₹500</span><span>₹5000+</span>
                    </div>
                </div>

                <button class="w-full bg-brand-blue text-white py-2 rounded-lg font-semibold hover:bg-blue-900 transition-colors">Apply Filters</button>
            </aside>

            <!-- Grid -->
            <main class="w-full md:w-3/4">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-6" id="all-destinations-grid">
                    <!-- Loaded via JS -->
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { fetchDestinations } from './js/data-fetcher.js';

        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('all-destinations-grid');
            const searchInput = document.getElementById('dest-search');
            let allDests = [];

            fetchDestinations().then(data => {
                allDests = data;
                renderDests(allDests);
            });

            function renderDests(dests) {
                grid.innerHTML = '';
                if (dests.length === 0) {
                     grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500 font-medium text-xl dark:text-gray-300">No destinations available.</div>';
                     return;
                }
                dests.forEach(dest => {
                    grid.innerHTML += `
                        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700 overflow-hidden hover:shadow-xl transition-shadow cursor-pointer group">
                            <div class="relative h-48 overflow-hidden">
                                <img src="${dest.image}" alt="${dest.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                                <div class="absolute top-4 right-4 bg-white dark:bg-slate-800/90 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold text-brand-blue dark:text-white">
                                    ${dest.duration}
                                </div>
                            </div>
                            <div class="p-6">
                                <div class="flex items-center text-gray-500 dark:text-gray-400 text-sm mb-2">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                    ${dest.location}
                                </div>
                                <h3 class="text-xl font-bold text-brand-blue mb-4 dark:text-white">${dest.title}</h3>
                                <div class="flex justify-between items-end border-t border-gray-100 dark:border-slate-700 pt-4">
                                    <div><span class="block text-xs text-gray-400">From</span><span class="text-xl font-extrabold text-brand-orange">${dest.price}</span></div>
                                    <a href="destination-detail.html?id=${dest.id}" class="text-sm font-semibold text-brand-blue hover:text-brand-orange transition-colors dark:text-white">Details &rarr;</a>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allDests.filter(d => d.title.toLowerCase().includes(term) || d.location.toLowerCase().includes(term));
                renderDests(filtered);
            });
        });
    </script>

    <!-- Auth Modal -->
    <div id="auth-modal" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-8 max-w-md w-full relative">
            <button onclick="document.getElementById('auth-modal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 dark:text-gray-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h2 class="text-3xl font-bold text-brand-blue dark:text-white mb-6" id="auth-title">Welcome Back</h2>
            <form id="auth-form" class="space-y-4">
                <div id="signup-fields" class="hidden space-y-4">
                    <input type="text" id="auth-first-name" placeholder="First Name" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-blue">
                    <input type="text" id="auth-last-name" placeholder="Last Name" class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-blue">
                </div>
                <input type="email" id="auth-email" placeholder="Email Address" required class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-blue">
                <input type="password" id="auth-password" placeholder="Password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-blue">
                <button type="submit" class="w-full bg-brand-orange text-white py-3 rounded-xl font-bold hover:bg-orange-600 transition-colors" id="auth-submit">Login</button>
            </form>
            <div class="mt-4 text-center text-sm text-gray-600 dark:text-gray-300">
                <span id="auth-toggle-text">Don't have an account?</span>
                <button type="button" id="auth-toggle-btn" class="text-brand-blue font-bold hover:underline dark:text-white">Sign Up</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/ai-assistant.js"></script>
</body>
</html>
