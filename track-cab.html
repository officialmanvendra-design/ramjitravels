<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Cab Tracking | Ramji Tour and Travel</title>
    <meta name="description" content="Track your Ramji Tour and Travel booked cab in real-time. View live location, driver details, and estimated time of arrival.">
    <meta name="robots" content="noindex, nofollow">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/theme.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { blue: '#0b2e59', orange: '#ff6b35', light: '#f8f9fa', green: '#10b981' } }, fontFamily: { sans: ['Outfit', 'sans-serif'] } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: calc(100vh - 80px); width: 100%; z-index: 10; }
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body class="font-sans bg-gray-50 dark:bg-slate-900 text-gray-800 dark:text-gray-100 antialiased h-screen overflow-hidden flex flex-col">
    <!-- Navbar -->
    <nav class="w-full z-50 bg-white dark:bg-slate-800 shadow-sm border-b border-gray-100 dark:border-slate-700 flex-shrink-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center gap-3">
                    <img src="assets/images/logo.png" alt="Ramji Travels Logo" class="h-[104px] w-[104px] object-contain" onerror="this.src='https://placehold.co/100x100?text=Logo'">
                    <span class="text-2xl font-extrabold text-brand-blue dark:text-white tracking-tight">Ramji <span class="text-brand-orange">Travels</span></span>
                </a>
                <div class="flex space-x-4 items-center">
                    <a href="profile.html" class="text-gray-800 dark:text-gray-100 hover:text-brand-orange font-medium transition-colors flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        Back to Profile
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Layout -->
    <div class="flex-1 flex overflow-hidden relative">
        <!-- Map Container -->
        <div id="map" class="flex-1"></div>

        <!-- Overlay Details Panel -->
        <div class="absolute top-6 left-6 z-20 w-80 bg-white/95 dark:bg-slate-800/95 backdrop-blur-md border border-gray-200 dark:border-slate-700 rounded-2xl shadow-2xl p-5">
            <div class="flex justify-between items-start mb-4">
                <h2 class="font-bold text-lg text-brand-blue dark:text-white flex items-center gap-2">
                    <svg class="w-5 h-5 text-brand-orange" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                    Live Tracking
                </h2>
                <span class="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded animate-pulse">LIVE</span>
            </div>
            
            <div id="booking-details" class="space-y-4 hidden">
                <div class="flex items-center gap-3 bg-gray-50 dark:bg-slate-900 p-3 rounded-xl border border-gray-100 dark:border-slate-700">
                    <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center overflow-hidden shrink-0">
                        <img src="https://images.unsplash.com/photo-1544717302-de2939b7ef71?w=100" alt="Driver" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <p class="font-bold text-sm text-gray-800 dark:text-gray-100">Rajesh Kumar</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400" id="vehicle-type">Sedan (UP14 CD 5678)</p>
                    </div>
                    <button class="ml-auto w-8 h-8 bg-brand-orange hover:bg-orange-600 rounded-full flex items-center justify-center text-white transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    </button>
                </div>

                <div class="relative pl-4 border-l-2 border-brand-orange ml-2 mt-2 space-y-4">
                    <div class="relative">
                        <div class="absolute -left-[21px] top-1 w-3 h-3 bg-brand-orange rounded-full ring-4 ring-white dark:ring-slate-800"></div>
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-0.5 dark:text-gray-300">Pickup</p>
                        <p class="text-sm font-semibold text-gray-800 dark:text-gray-100" id="pickup-text">Loading...</p>
                    </div>
                    <div class="relative">
                        <div class="absolute -left-[21px] top-1 w-3 h-3 bg-brand-blue rounded-full ring-4 ring-white dark:ring-slate-800"></div>
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-0.5 dark:text-gray-300">Drop-off</p>
                        <p class="text-sm font-semibold text-gray-800 dark:text-gray-100" id="dropoff-text">Loading...</p>
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-100 dark:border-slate-700">
                    <p class="text-center text-xs text-gray-500 font-semibold dark:text-gray-300" id="eta-text">Calculating ETA...</p>
                </div>
            </div>
            
            <div id="loading-state" class="py-10 text-center">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-orange mx-auto mb-3"></div>
                <p class="text-sm text-gray-500 dark:text-gray-300">Locating driver...</p>
            </div>
        </div>
    </div>

    <!-- Leaflet JS & Routing Machine -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <!-- Supabase & App Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/supabase-config.js"></script>
    <script type="module" src="js/track-cab.js"></script>
</body>
</html>
